suite: secret creation
templates:
  - templates/secret.yaml
  - templates/deployment.yaml
  - templates/configmap.yaml

tests:
  # --- secret creation ---

  - it: creates a secret by default
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: creates a secret when only existingSecretName is set (SUPERUSER_PASSWORD still needed)
    template: templates/secret.yaml
    set:
      config.existingSecretName: my-app-secrets
      config.existingSecretKey: MY_SECRET_KEY
    asserts:
      - hasDocuments:
          count: 1

  - it: creates a secret when only auth.existingSecret is set (SECRET_KEY still needed)
    template: templates/secret.yaml
    set:
      config.auth.existingSecret: my-auth-secret
    asserts:
      - hasDocuments:
          count: 1

  - it: does not create a secret when both existingSecretName and auth.existingSecret are set
    template: templates/secret.yaml
    set:
      config.existingSecretName: my-app-secrets
      config.existingSecretKey: MY_SECRET_KEY
      config.auth.existingSecret: my-auth-secret
    asserts:
      - hasDocuments:
          count: 0

  # --- secret name ---

  - it: uses the default generated secret name
    template: templates/secret.yaml
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-home-information-secret

  - it: uses a custom secretName when set
    template: templates/secret.yaml
    set:
      config.auth.secretName: my-custom-secret
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-secret

  # --- secret data: both managed ---

  - it: includes both SECRET_KEY and SUPERUSER_PASSWORD by default
    template: templates/secret.yaml
    asserts:
      - exists:
          path: data.SECRET_KEY
      - exists:
          path: data.SUPERUSER_PASSWORD

  - it: populates DJANGO_SUPERUSER_EMAIL in configmap from config.auth.adminEmail
    template: templates/configmap.yaml
    set:
      config.auth.adminEmail: admin@example.com
    asserts:
      - equal:
          path: data.DJANGO_SUPERUSER_EMAIL
          value: admin@example.com

  # --- secret data: partial external ---

  - it: omits SECRET_KEY when existingSecretName is set
    template: templates/secret.yaml
    set:
      config.existingSecretName: my-app-secrets
      config.existingSecretKey: MY_SECRET_KEY
    asserts:
      - notExists:
          path: data.SECRET_KEY
      - exists:
          path: data.SUPERUSER_PASSWORD

  - it: omits SUPERUSER_PASSWORD when auth.existingSecret is set
    template: templates/secret.yaml
    set:
      config.auth.existingSecret: my-auth-secret
    asserts:
      - exists:
          path: data.SECRET_KEY
      - notExists:
          path: data.SUPERUSER_PASSWORD

  # --- annotations ---

  - it: sets the helm resource-policy keep annotation
    template: templates/secret.yaml
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  # --- deployment: DJANGO_SECRET_KEY ---

  - it: pulls DJANGO_SECRET_KEY from the generated secret by default
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-home-information-secret
                key: SECRET_KEY

  - it: pulls DJANGO_SECRET_KEY from existingSecretName when set
    template: templates/deployment.yaml
    set:
      config.existingSecretName: my-app-secrets
      config.existingSecretKey: MY_SECRET_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: my-app-secrets
                key: MY_SECRET_KEY

  # --- deployment: DJANGO_SUPERUSER_PASSWORD ---

  - it: pulls DJANGO_SUPERUSER_PASSWORD from the generated secret by default
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SUPERUSER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-home-information-secret
                key: SUPERUSER_PASSWORD

  - it: pulls DJANGO_SUPERUSER_PASSWORD from auth.existingSecret when set
    template: templates/deployment.yaml
    set:
      config.auth.existingSecret: my-auth-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SUPERUSER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-auth-secret
                key: DJANGO_SUPERUSER_PASSWORD

  - it: uses a custom key for DJANGO_SUPERUSER_PASSWORD when existingSecretKey is set
    template: templates/deployment.yaml
    set:
      config.auth.existingSecret: my-auth-secret
      config.auth.existingSecretKey: MY_PASSWORD_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SUPERUSER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-auth-secret
                key: MY_PASSWORD_KEY

  - it: uses a custom auth.secretName for DJANGO_SUPERUSER_PASSWORD
    template: templates/deployment.yaml
    set:
      config.auth.secretName: my-custom-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SUPERUSER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret
                key: SUPERUSER_PASSWORD

  # --- deployment: independence of the two secrets ---

  - it: does not affect DJANGO_SUPERUSER_PASSWORD when existingSecretName is set
    template: templates/deployment.yaml
    set:
      config.existingSecretName: my-app-secrets
      config.existingSecretKey: MY_SECRET_KEY
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SUPERUSER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-home-information-secret
                key: SUPERUSER_PASSWORD

  - it: does not affect DJANGO_SECRET_KEY when auth.existingSecret is set
    template: templates/deployment.yaml
    set:
      config.auth.existingSecret: my-auth-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-home-information-secret
                key: SECRET_KEY

  # --- config.auth.enabled: false ---

  - it: sets HI_SUPPRESS_AUTHENTICATION to false when auth is enabled
    template: templates/configmap.yaml
    asserts:
      - equal:
          path: data.HI_SUPPRESS_AUTHENTICATION
          value: "false"

  - it: sets HI_SUPPRESS_AUTHENTICATION to true when auth is disabled
    template: templates/configmap.yaml
    set:
      config.auth.enabled: false
    asserts:
      - equal:
          path: data.HI_SUPPRESS_AUTHENTICATION
          value: "true"

  - it: includes SUPERUSER_PASSWORD in secret when auth is disabled
    template: templates/secret.yaml
    set:
      config.auth.enabled: false
    asserts:
      - exists:
          path: data.SUPERUSER_PASSWORD

  - it: includes DJANGO_SUPERUSER_PASSWORD env var in deployment when auth is disabled
    template: templates/deployment.yaml
    set:
      config.auth.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DJANGO_SUPERUSER_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-home-information-secret
                key: SUPERUSER_PASSWORD

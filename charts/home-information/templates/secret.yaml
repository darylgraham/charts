{{- if not (and .Values.config.existingSecretName .Values.config.auth.existingSecret) }}
{{- $secretName := include "home-information.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $secretkey := randAlphaNum 32 }}
{{- $password := randAlphaNum 32 }}
{{- if $existing }}
  {{- $existingKey := index $existing.data "SECRET_KEY" | default "" }}
  {{- if $existingKey }}{{- $secretkey = $existingKey | b64dec }}{{- end }}
  {{- $existingPassword := index $existing.data "SUPERUSER_PASSWORD" | default "" }}
  {{- if $existingPassword }}{{- $password = $existingPassword | b64dec }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "home-information.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if not .Values.config.existingSecretName }}
  SECRET_KEY: {{ $secretkey | b64enc | quote }}
  {{- end }}
  {{- if not .Values.config.auth.existingSecret }}
  SUPERUSER_PASSWORD: {{ $password | b64enc | quote }}
  {{- end }}
{{- end }}
